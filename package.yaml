name:                cadence
version:             0.1.0.0
github:              "NicholasMason-Apps/cadence"
license:             BSD-3-Clause
author:              "Nicholas Mason-Apps"
maintainer:          "nicholas.masonapps1@gmail.com"
copyright:           "2026 Nicholas Mason-Apps"

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package
synopsis:            An ECS-based 2D game framework
category:            Game, Game Engine

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/NicholasMason-Apps/cadence#readme>

dependencies:
- base >= 4.7 && < 5
- apecs >= 0.9.6 && < 0.10
- sdl2 >= 2.5.5 && < 2.6
- sdl2-ttf >= 2.1.3 && < 2.2
- sdl2-image >= 2.1.0 && < 2.2
- vector >= 0.13.1 && < 0.14
- containers >= 0.6.7 && < 0.7
- template-haskell >= 2.20.0 && < 2.21
- text >= 2.0.2 && < 2.1
- linear >= 1.22 && < 1.24

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src

executables:
  noughts-and-crosses:
    main:                noughts-and-crosses.lhs
    source-dirs:         examples
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - cadence
    - random >= 1.2.1.3 && < 1.4
  hungeon:
    main:                Main.hs
    source-dirs:         examples/hungeon
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -with-rtsopts=--nonmoving-gc
    dependencies:
    - cadence
    - random >= 1.2.1.3 && < 1.4
    - aeson >= 2.1.2.1 && < 2.3
    - bytestring >= 0.11.5 && < 0.12
    - random-shuffle >= 0.0.4 && < 0.1

tests:
  cadence-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - cadence
    - hspec
    - QuickCheck
    - HUnit
    - hspec-contrib
    - exceptions
